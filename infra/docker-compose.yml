version: "3.9"

services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports: ["3306:3306"]
    volumes:
      - mysqldata:/var/lib/mysql

  redis:
    image: redis:7
    ports: ["6379:6379"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - miniodata:/data

  backend:
    build: ../backend
    env_file: ../.env.example
    depends_on: [mysql, redis, minio]
    ports: ["8000:8000"]

  worker:
    build: ../worker
    env_file: ../.env.example
    depends_on: [mysql, redis, minio]

volumes:
  mysqldata:
  miniodata:
